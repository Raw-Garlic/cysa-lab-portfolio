# AIDE configuration file — CySA+ Lab 06
# Analyst: Alejandro W. Orellana

# Database locations
database_in=file:/var/lib/aide/aide.db
database_out=file:/var/lib/aide/aide.db.new
database_new=file:/var/lib/aide/aide.db.new

# Log output
log_level=warning

# Define what to check
NORMAL = sha256+rmd160+sha512+tiger+haval+gost+crc32+whirlpool

# Directories to monitor
/etc NORMAL
/bin NORMAL
/sbin NORMAL
/usr/bin NORMAL
/usr/sbin NORMAL
/boot NORMAL

# Exclude noisy paths
!/var/log
!/var/run
!/proc
!/sys
!/dev
!/tmp
